<div class="patient-shell" [class.patient-shell--with-sidebar]="showDesktopSidebar()">
  <header class="patient-header">
    <button class="mobile-menu-button" type="button" aria-label="Open navigation"
      [attr.aria-expanded]="mobileMenuOpen()" (click)="toggleMobileMenu()">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" /></svg>
    </button>

    <a class="patient-brand" routerLink="/patient/dashboard-day-one" aria-label="Baseline Health dashboard">
      <img src="/assets/images/auth-logo.svg" alt="Baseline Health" />
    </a>

    <div class="patient-header__actions">
      <button class="notification-button" type="button" aria-label="Notifications">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4" />
        </svg>
        <span></span>
      </button>

      <div class="profile-menu dropdown" ngbDropdown placement="bottom-end">
        <button class="profile-trigger dropdown-toggle" type="button" ngbDropdownToggle>
          <span class="profile-avatar">SM</span>
          <span>Sam M.</span>
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m4 6 4 4 4-4" /></svg>
        </button>

        <div class="profile-dropdown dropdown-menu dropdown-menu-end" ngbDropdownMenu>
          <button class="dropdown-item" type="button" ngbDropdownItem>
            <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="7" r="3" /><path d="M4 17c.7-3 2.7-4.5 6-4.5s5.3 1.5 6 4.5" /></svg>
            Profile
          </button>
          <a class="dropdown-item" routerLink="/auth/login" ngbDropdownItem>
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M8 4H4v12h4M12 6l4 4-4 4M16 10H7" /></svg>
            Logout
          </a>
        </div>
      </div>
    </div>
  </header>

  @if (mobileMenuOpen()) {
  <button class="sidebar-backdrop" type="button" aria-label="Close navigation" (click)="closeMobileMenu()"></button>
  }

  <aside class="patient-sidebar" [class.patient-sidebar--desktop-hidden]="!showDesktopSidebar()"
    [class.patient-sidebar--mobile-open]="mobileMenuOpen()">
    <button class="sidebar-close" type="button" aria-label="Close navigation" (click)="closeMobileMenu()">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18" /></svg>
    </button>

    <nav class="patient-nav" aria-label="Patient navigation">
      <a routerLink="/patient/dashboard" routerLinkActive="active" (click)="closeMobileMenu()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="6" height="6" rx="1" /><rect x="14" y="4" width="6" height="6" rx="1" /><rect x="4" y="14" width="6" height="6" rx="1" /><rect x="14" y="14" width="6" height="6" rx="1" /></svg>
        Dashboard
      </a>
      <a routerLink="/patient/medication" routerLinkActive="active" (click)="closeMobileMenu()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8.5 15.5 7-7a3.5 3.5 0 1 1 5 5l-7 7a3.5 3.5 0 0 1-5-5ZM10 14l4 4" /></svg>
        Medications
      </a>
    </nav>

    <section class="hipaa-card">
      <strong>
        <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2.5 4.5 5v4c0 3.7 2.2 6.5 5.5 8.5 3.3-2 5.5-4.8 5.5-8.5V5L10 2.5Z" /></svg>
        HIPAA SECURED
      </strong>
      <p>Your session is encrypted end-to-end. Care notes are reviewed only by your care team.</p>
    </section>
  </aside>

  <main class="patient-main">
    <div class="patient-content">
      <router-outlet />
    </div>

    <footer class="patient-footer">
      <span class="footer-secure">
        <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="3.5" y="7" width="9" height="6.5" rx="1" /><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" /></svg>
        Secure &amp; HIPAA Compliant
      </span>
      <span><a href="#privacy">Privacy Policy</a><i></i><a href="#terms">Terms of Service</a></span>
      <span>© 2026 Baseline Health. All rights reserved</span>
    </footer>
  </main>
</div>
