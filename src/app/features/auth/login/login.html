<section class="auth-flow d-flex flex-column w-100">
  <div class="auth-heading d-flex flex-column align-items-center text-center">
    <div class="heading-icon d-inline-flex align-items-center justify-content-center" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M10 7l5 5-5 5" />
        <path d="M15 12H3" />
        <path d="M14 4h4a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-4" />
      </svg>
    </div>
    <h1>Welcome back</h1>
    <p>Sign in to your patient portal</p>
  </div>

  <form class="auth-card d-flex flex-column w-100">
    <label class="field form-label mb-0">
      <span>Email</span>
      <span class="input-shell d-flex align-items-center w-100">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 6h16v12H4z" />
          <path d="m4 7 8 6 8-6" />
        </svg>
        <input class="form-control border-0 shadow-none p-0" type="email" placeholder="you@example.com" />
      </span>
    </label>

    <label class="field form-label mb-0">
      <span>Password</span>
      <span class="input-shell d-flex align-items-center w-100">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <rect x="5" y="10" width="14" height="10" rx="2" />
          <path d="M8 10V7a4 4 0 0 1 8 0v3" />
        </svg>
        <input
          class="form-control border-0 shadow-none p-0"
          [type]="passwordVisible() ? 'text' : 'password'"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <button
          class="input-action"
          type="button"
          [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
          [attr.aria-pressed]="passwordVisible()"
          (click)="togglePasswordVisibility()"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            @if (passwordVisible()) {
              <path d="m2 2 20 20" />
              <path d="M6.7 6.7C4.7 8.1 3.3 10.1 2 12c2.4 3.6 5.7 6 10 6 1.4 0 2.7-.3 3.9-.7" />
              <path d="M10.7 5.1A10.5 10.5 0 0 1 12 5c4.3 0 7.6 2.4 10 7-.5.8-1.1 1.5-1.7 2.1" />
              <path d="M14.1 14.1a3 3 0 0 1-4.2-4.2" />
            } @else {
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
              <circle cx="12" cy="12" r="3" />
            }
          </svg>
        </button>
      </span>
    </label>

    <a class="forgot-link align-self-end text-decoration-none" routerLink="/auth/forgot-password">Forgot password?</a>

    <button class="primary-btn btn w-100" type="button">Sign in</button>
  </form>

  <a class="create-link text-center text-decoration-none" routerLink="/auth/registration">
    <span>Don't have an account?</span>
    <strong>Create one</strong>
  </a>

  <p class="security-note mb-0 text-center">Protected by HIPAA-compliant security</p>
</section>
