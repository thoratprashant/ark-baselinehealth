<section class="auth-flow">
  <div class="auth-heading">
    <div class="heading-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M10 7l5 5-5 5" />
        <path d="M15 12H3" />
        <path d="M14 4h4a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-4" />
      </svg>
    </div>
    <h1>Welcome back</h1>
    <p>Sign in to your patient portal</p>
  </div>

  <form class="auth-card">
    <label class="field">
      <span>Email</span>
      <span class="input-shell">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 6h16v12H4z" />
          <path d="m4 7 8 6 8-6" />
        </svg>
        <input type="email" placeholder="you@example.com" />
      </span>
    </label>

    <label class="field">
      <span>Password</span>
      <span class="input-shell">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <rect x="5" y="10" width="14" height="10" rx="2" />
          <path d="M8 10V7a4 4 0 0 1 8 0v3" />
        </svg>
        <input type="password" placeholder="••••••••" />
        <svg class="trailing-icon" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </span>
    </label>

    <a class="forgot-link" routerLink="/auth/forgot-password">Forgot password?</a>

    <button type="button">Sign in</button>
  </form>

  <a class="create-link" routerLink="/auth/registration">
    <span>Don't have an account?</span>
    <strong>Create one</strong>
  </a>

  <p class="security-note">Protected by HIPAA-compliant security</p>
</section>
