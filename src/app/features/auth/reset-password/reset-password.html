<section class="auth-flow d-flex flex-column w-100">
  <div class="auth-heading d-flex flex-column align-items-center text-center">
    <div class="heading-icon d-inline-flex align-items-center justify-content-center" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <rect x="5" y="10" width="14" height="10" rx="2" />
        <path d="M8 10V7a4 4 0 0 1 8 0v3" />
        <path d="M12 14v2" />
      </svg>
    </div>
    <h1>Set New Password</h1>
    <p>Create a strong password for your account</p>
  </div>

  <form
    class="auth-card d-flex flex-column w-100"
    [formGroup]="resetPasswordForm"
    (ngSubmit)="submit()"
    novalidate
  >
    <label class="field form-label mb-0">
      <span>New password</span>
      <span
        class="input-shell d-flex align-items-center w-100"
        [class.input-invalid]="resetPasswordForm.controls.newPassword.touched && resetPasswordForm.controls.newPassword.invalid"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <rect x="5" y="10" width="14" height="10" rx="2" />
          <path d="M8 10V7a4 4 0 0 1 8 0v3" />
        </svg>
        <input
          class="form-control border-0 shadow-none p-0"
          formControlName="newPassword"
          [type]="passwordVisible() ? 'text' : 'password'"
          placeholder="Enter new password"
          autocomplete="new-password"
          [attr.aria-invalid]="resetPasswordForm.controls.newPassword.touched && resetPasswordForm.controls.newPassword.invalid"
          aria-describedby="new-password-error"
        />
        <button
          class="input-action"
          type="button"
          [attr.aria-label]="passwordVisible() ? 'Hide new password' : 'Show new password'"
          [attr.aria-pressed]="passwordVisible()"
          (click)="togglePasswordVisibility()"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            @if (passwordVisible()) {
              <path d="m2 2 20 20" />
              <path d="M6.7 6.7C4.7 8.1 3.3 10.1 2 12c2.4 3.6 5.7 6 10 6 1.4 0 2.7-.3 3.9-.7" />
              <path d="M10.7 5.1A10.5 10.5 0 0 1 12 5c4.3 0 7.6 2.4 10 7-.5.8-1.1 1.5-1.7 2.1" />
              <path d="M14.1 14.1a3 3 0 0 1-4.2-4.2" />
            } @else {
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
              <circle cx="12" cy="12" r="3" />
            }
          </svg>
        </button>
      </span>
      @if (resetPasswordForm.controls.newPassword.touched && resetPasswordForm.controls.newPassword.errors) {
        <small id="new-password-error" class="field-error">
          @if (resetPasswordForm.controls.newPassword.hasError('required')) {
            New password is required.
          } @else if (resetPasswordForm.controls.newPassword.hasError('minlength')) {
            Password must contain at least 8 characters.
          } @else if (resetPasswordForm.controls.newPassword.hasError('pattern')) {
            Include an uppercase letter, lowercase letter and number.
          }
        </small>
      }
    </label>

    <label class="field form-label mb-0">
      <span>Confirm password</span>
      <span
        class="input-shell d-flex align-items-center w-100"
        [class.input-invalid]="resetPasswordForm.controls.confirmPassword.touched && (resetPasswordForm.controls.confirmPassword.invalid || resetPasswordForm.hasError('passwordMismatch'))"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <rect x="5" y="10" width="14" height="10" rx="2" />
          <path d="M8 10V7a4 4 0 0 1 8 0v3" />
        </svg>
        <input
          class="form-control border-0 shadow-none p-0"
          formControlName="confirmPassword"
          [type]="confirmPasswordVisible() ? 'text' : 'password'"
          placeholder="Confirm new password"
          autocomplete="new-password"
          [attr.aria-invalid]="resetPasswordForm.controls.confirmPassword.touched && (resetPasswordForm.controls.confirmPassword.invalid || resetPasswordForm.hasError('passwordMismatch'))"
          aria-describedby="confirm-password-error"
        />
        <button
          class="input-action"
          type="button"
          [attr.aria-label]="confirmPasswordVisible() ? 'Hide confirm password' : 'Show confirm password'"
          [attr.aria-pressed]="confirmPasswordVisible()"
          (click)="toggleConfirmPasswordVisibility()"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            @if (confirmPasswordVisible()) {
              <path d="m2 2 20 20" />
              <path d="M6.7 6.7C4.7 8.1 3.3 10.1 2 12c2.4 3.6 5.7 6 10 6 1.4 0 2.7-.3 3.9-.7" />
              <path d="M10.7 5.1A10.5 10.5 0 0 1 12 5c4.3 0 7.6 2.4 10 7-.5.8-1.1 1.5-1.7 2.1" />
              <path d="M14.1 14.1a3 3 0 0 1-4.2-4.2" />
            } @else {
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" />
              <circle cx="12" cy="12" r="3" />
            }
          </svg>
        </button>
      </span>
      @if (resetPasswordForm.controls.confirmPassword.touched) {
        @if (resetPasswordForm.controls.confirmPassword.hasError('required')) {
          <small id="confirm-password-error" class="field-error">Confirm password is required.</small>
        } @else if (resetPasswordForm.hasError('passwordMismatch')) {
          <small id="confirm-password-error" class="field-error">Passwords do not match.</small>
        }
      }
    </label>

    <button class="primary-btn btn w-100" type="submit" [disabled]="resetPasswordForm.invalid">
      Reset password
    </button>
  </form>

  <a class="back-link d-flex align-items-center justify-content-center text-decoration-none" routerLink="/auth/login">
    <svg aria-hidden="true" viewBox="0 0 24 24">
      <path d="M19 12H5" />
      <path d="m12 19-7-7 7-7" />
    </svg>
    <span>Back to sign in</span>
  </a>

  <p class="security-note mb-0 text-center">Protected by HIPAA-compliant security</p>
</section>
