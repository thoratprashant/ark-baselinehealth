<section class="auth-flow d-flex flex-column w-100">
  <div class="auth-heading d-flex flex-column align-items-center text-center">
    <div class="heading-icon d-inline-flex align-items-center justify-content-center" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M4 6h16v12H4z" />
        <path d="m4 7 8 6 8-6" />
      </svg>
    </div>
    <h1>Forgot Password</h1>
    <p>Enter your email to receive a reset link</p>
  </div>

  <form class="auth-card d-flex flex-column w-100">
    <label class="field form-label mb-0">
      <span>Email address</span>
      <span class="input-shell d-flex align-items-center w-100">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 6h16v12H4z" />
          <path d="m4 7 8 6 8-6" />
        </svg>
        <input class="form-control border-0 shadow-none p-0" type="email" placeholder="Enter your email id" />
      </span>
    </label>

    <button class="primary-btn btn w-100" type="button" routerLink="/auth/reset-password">Send reset link</button>
  </form>

  <a class="back-link d-flex align-items-center justify-content-center text-decoration-none" routerLink="/auth/login">
    <svg aria-hidden="true" viewBox="0 0 24 24">
      <path d="M19 12H5" />
      <path d="m12 19-7-7 7-7" />
    </svg>
    <span>Back to sign in</span>
  </a>

  <p class="security-note mb-0 text-center">Protected by HIPAA-compliant security</p>
</section>
