<section class="auth-flow">
  <div class="auth-heading">
    <div class="heading-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M4 6h16v12H4z" />
        <path d="m4 7 8 6 8-6" />
      </svg>
    </div>
    <h1>Reset Password</h1>
    <p>Enter your email to receive a reset link</p>
  </div>

  <form class="auth-card">
    <label class="field">
      <span>Email address</span>
      <span class="input-shell">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 6h16v12H4z" />
          <path d="m4 7 8 6 8-6" />
        </svg>
        <input type="email" placeholder="you@example.com" />
      </span>
    </label>

    <button type="button">Send reset link</button>
  </form>

  <a class="back-link" routerLink="/auth/login">
    <svg aria-hidden="true" viewBox="0 0 24 24">
      <path d="M19 12H5" />
      <path d="m12 19-7-7 7-7" />
    </svg>
    <span>Back to sign in</span>
  </a>

  <p class="security-note">Protected by HIPAA-compliant security</p>
</section>
